name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write       # create the GitHub release + upload artifacts
  packages: write       # push Docker images to ghcr.io
  id-token: write       # OIDC (cosign / provenance, if added later)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      # The git tag is the source of truth for the release version; the VERSION
      # file feeds the Nix flake (flakes can't read tags). Enforce they agree so
      # `nix build` off a tag reports the same number GoReleaser publishes.
      - name: Verify VERSION matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          if [ "$tag" != "$file" ]; then
            echo "::error::tag v$tag does not match VERSION file ($file). Bump VERSION before tagging."
            exit 1
          fi
          echo "version $tag OK"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cgo cross-compile to arm64 needs the aarch64 toolchain; libcap-ng0
      # is the runtime dep of the prebuilt msb supervisor that EnsureInstalled
      # downloads (only matters if we ever boot a VM here — we don't, but
      # `go test` may exercise the FFI loader on amd64).
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng0 gcc-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
