name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write       # create the GitHub release + upload artifacts
  packages: write       # push Docker images to ghcr.io
  id-token: write       # OIDC (cosign / provenance, if added later)

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # cgo cross-compile to arm64 needs the aarch64 toolchain; libcap-ng0
      # is the runtime dep of the prebuilt msb supervisor that EnsureInstalled
      # downloads (only matters if we ever boot a VM here — we don't, but
      # `go test` may exercise the FFI loader on amd64).
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng0 gcc-aarch64-linux-gnu

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
