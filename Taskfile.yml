# Taskfile for msbd. https://taskfile.dev
#
# Install: https://taskfile.dev/installation/ (or `nix run nixpkgs#go-task`).
# Run `task` with no args to list available tasks.
version: "3"

vars:
  # Single source of truth for the version lives in the VERSION file.
  VERSION:
    sh: tr -d '[:space:]' < VERSION

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: Build the msbd binary to ./bin/msbd (CGO)
    env:
      CGO_ENABLED: "1"
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o ./bin/msbd ./cmd/msbd

  dashboard:
    desc: Regenerate the dashboard (templ code + Tailwind CSS). Run after editing internal/dashboard/**/*.templ.
    cmds:
      - templ generate
      - tailwindcss -i internal/dashboard/assets/css/input.css -o internal/dashboard/assets/css/output.css --minify

  # ---------------------------------------------------------------------------
  # Dev loop: templ hot-reload proxy + air binary rebuild + Tailwind watch,
  # all in parallel via `task dev`.
  #
  #   • Browser:      http://localhost:7332   (templ proxy, auto-reloads)
  #   • msbd app:     http://localhost:8099    (proxied; terminal WS lives here)
  #   • API key:      devkey                   (dashboard terminal uses ?key=)
  #
  # Requires `air` and `templ` on PATH and a host with /dev/kvm (CGO build).
  # ---------------------------------------------------------------------------
  dev:
    desc: 'Start the dev server (templ hot-reload on :7332, air rebuild, Tailwind watch)'
    deps: [dev:templ, dev:tailwind, dev:server]

  dev:templ:
    desc: templ generate --watch with a live-reload proxy on :7332 (browser-facing)
    cmds:
      - templ generate --watch --proxy="http://localhost:8099" --proxyport=7332 --open-browser=false

  dev:tailwind:
    desc: Watch the dashboard Tailwind CSS (rebuilds output.css on .templ changes)
    cmds:
      - tailwindcss -i internal/dashboard/assets/css/input.css -o internal/dashboard/assets/css/output.css --watch

  dev:server:
    desc: air hot-reload of the msbd binary (CGO; rebuilds + restarts on .go changes)
    env:
      CGO_ENABLED: "1"
      MSBD_API_KEY: devkey
    cmds:
      - >
        air
        --build.pre_cmd "rm -f tmp/bin/msbd"
        --build.cmd "go build -o tmp/bin/msbd ./cmd/msbd"
        --build.entrypoint "./tmp/bin/msbd"
        --build.args_bin "serve"
        --build.delay "500"
        --build.exclude_dir "node_modules,bin,dist,tmp,.git,.direnv"
        --build.include_ext "go"
        --build.stop_on_error "false"
        --build.send_interrupt true
        --build.kill_delay "1s"
        --misc.clean_on_exit true

  dev:kill:
    desc: Kill stray dev processes (templ proxy, air, tailwind, msbd) and free ports 7332/8099
    ignore_error: true
    cmds:
      - pkill -f "templ generate --watch" || true
      - pkill -f "air --build.cmd" || true
      - pkill -f "tailwindcss -i internal/dashboard/assets/css/input.css" || true
      - pkill -f "tmp/bin/msbd serve" || true
      - |
        for port in 7332 8099; do
          pids=$(lsof -ti tcp:$port 2>/dev/null || true)
          [ -n "$pids" ] && kill $pids 2>/dev/null || true
        done
      - echo "Dev server stopped."

  run:
    desc: Build and run msbd (set MSBD_API_KEY in your env first)
    deps: [build]
    cmds:
      - ./bin/msbd

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  test:race:
    desc: Run tests with the race detector (matches CI)
    cmds:
      - go test -race ./...

  lint:
    desc: Run golangci-lint and go vet
    cmds:
      - golangci-lint run ./...
      - go vet ./...

  fmt:
    desc: Format all Go files
    cmds:
      - go fmt ./...

  fmt:check:
    desc: Check formatting (fails if files need formatting)
    cmds:
      - test -z "$(gofmt -l .)" || (echo "Files need formatting:" && gofmt -l . && exit 1)

  tidy:
    desc: Tidy go.mod / go.sum
    cmds:
      - go mod tidy

  version:
    desc: Print the current version (from the VERSION file)
    cmds:
      - echo "{{.VERSION}}"
    silent: true

  # ---------------------------------------------------------------------------
  # Release: atomically bump VERSION, commit, tag, and push. The version is
  # typed exactly once (NEW_VERSION=...), so the VERSION file and the git tag
  # can't drift — which is what the CI guard in release.yml enforces.
  #
  #   task release NEW_VERSION=1.2.3
  # ---------------------------------------------------------------------------
  release:
    desc: 'Cut a release: task release NEW_VERSION=1.2.3'
    requires:
      vars: [NEW_VERSION]
    preconditions:
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: "working tree is dirty — commit or stash changes before releasing"
      - sh: 'echo "{{.NEW_VERSION}}" | grep -Eq "^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$"'
        msg: "NEW_VERSION must be semver, e.g. 1.2.3 (no leading v)"
      - sh: '! git rev-parse -q --verify "refs/tags/v{{.NEW_VERSION}}" >/dev/null'
        msg: "tag v{{.NEW_VERSION}} already exists"
    cmds:
      - printf '%s\n' "{{.NEW_VERSION}}" > VERSION
      - git add VERSION
      - 'git commit -m "release: v{{.NEW_VERSION}}"'
      # -c tag.gpgsign=false keeps this a lightweight, non-interactive tag even
      # when the user's global config sets tag.gpgsign=true (which would force a
      # signed annotated tag and pop open an editor for the tag message).
      - git -c tag.gpgsign=false tag "v{{.NEW_VERSION}}"
      - 'echo "Tagged v{{.NEW_VERSION}}. Push with: git push origin HEAD v{{.NEW_VERSION}}"'

  release:push:
    desc: 'Cut a release and push it: task release:push NEW_VERSION=1.2.3'
    requires:
      vars: [NEW_VERSION]
    cmds:
      - task: release
        vars: { NEW_VERSION: "{{.NEW_VERSION}}" }
      - git push origin HEAD "v{{.NEW_VERSION}}"
